// ---- Pre‑compute mapping arrays ----
const dpToGs = [];  // dp index -> gs index (null if out of range)
let gsPtr = 0;
for (let dpIdx = 0; dpIdx < D.length; dpIdx++) {
  while (gsPtr < G.length && BLOCKED.has(gsPtr)) gsPtr++;
  if (gsPtr < G.length) {
    dpToGs.push(gsPtr);
    gsPtr++;
  } else {
    dpToGs.push(null);
  }
}
const gsToDp = new Array(G.length).fill(null);
for (let dpIdx = 0; dpIdx < dpToGs.length; dpIdx++) {
  const gsIdx = dpToGs[dpIdx];
  if (gsIdx !== null) gsToDp[gsIdx] = dpIdx;
}

// ---- Conversion ----
document.getElementById('convertBtn').addEventListener('click', () => {
  const src = document.getElementById('source').value;
  const tgt = document.getElementById('target').value;
  const file = document.getElementById('fileInput').files[0];
  const out = document.getElementById('result');
  if (!file) { out.style.display='block'; out.style.background='#fee2e2'; out.textContent='Please select a file.'; return; }

  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data.dataValues)) throw new Error('No dataValues array.');
      const result = [];
      let filled = 0, zeros = 0, skipped = 0;

      if (src === 'dpnigeria' && tgt === 'gsphcda') {
        // Build lookup from DP key -> value
        const dpVal = new Map();
        data.dataValues.forEach(dv => dpVal.set(dv.dataElement+'||'+dv.categoryOptionCombo, dv.value));
        for (let g = 0; g < G.length; g++) {
          const val = BLOCKED.has(g) ? '0' :
            (gsToDp[g] !== null && gsToDp[g] < D.length
              ? (dpVal.get(D[gsToDp[g]].d+'||'+D[gsToDp[g]].c) ?? '0')
              : '0');
          result.push({ dataElement: G[g].d, categoryOptionCombo: G[g].c, value: val });
          if (val === '0') zeros++; else filled++;
        }
      } else if (src === 'gsphcda' && tgt === 'dpnigeria') {
        const gsVal = new Map();
        data.dataValues.forEach(dv => gsVal.set(dv.dataElement+'||'+dv.categoryOptionCombo, dv.value));
        for (let g = 0; g < G.length; g++) {
          if (BLOCKED.has(g)) continue;
          const dpIdx = gsToDp[g];
          if (dpIdx === null || dpIdx >= D.length) continue;
          const val = gsVal.get(G[g].d+'||'+G[g].c) ?? '0';
          result.push({ dataElement: D[dpIdx].d, categoryOptionCombo: D[dpIdx].c, value: val });
          if (val === '0') zeros++; else filled++;
        }
      }

      const output = { facility: data.facility || {}, reportDate: new Date().toISOString(), dataValues: result };
      const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url;
      a.download = 'converted_' + (data.facility?.facility || 'data') + '.json';
      a.click(); URL.revokeObjectURL(url);
      out.style.display='block'; out.style.background='#f0fdf4';
      out.textContent = `Converted ${result.length} values. Filled: ${filled}, Zero: ${zeros}`;
    } catch (err) {
      out.style.display='block'; out.style.background='#fee2e2';
      out.textContent = 'Error: ' + err.message;
    }
  };
  reader.readAsText(file);
});
