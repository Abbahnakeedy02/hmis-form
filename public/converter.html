// ====== Build master order from gsphcdaFields ======
const masterFields = gsphcdaFields;

// Build lookup for dpnigeria
const dpnigeriaIndex = new Map();
dpnigeriaFields.forEach((f, idx) => {
  const key = f.dataElement + '||' + f.categoryOptionCombo;
  dpnigeriaIndex.set(key, idx);
});

// Build lookup for gsphcda
const gsphcdaIndex = new Map();
gsphcdaFields.forEach((f, idx) => {
  const key = f.dataElement + '||' + f.categoryOptionCombo;
  gsphcdaIndex.set(key, idx);
});

function getRowNumber(label) {
  const match = String(label).match(/^(\d+)/);
  return match ? parseInt(match[1]) : null;
}

// ====== Converter logic ======
document.getElementById('convertBtn').addEventListener('click', () => {
  const sourceSite = document.getElementById('source').value;
  const targetSite = document.getElementById('target').value;
  const skipReadOnly = document.getElementById('skipReadOnly').checked;
  const fileInput = document.getElementById('fileInput');
  const resultDiv = document.getElementById('result');

  if (!fileInput.files[0]) {
    resultDiv.style.display = 'block';
    resultDiv.style.background = '#fee2e2';
    resultDiv.textContent = 'Please select a JSON file.';
    return;
  }

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const sourceData = JSON.parse(e.target.result);
      if (!Array.isArray(sourceData.dataValues)) {
        throw new Error('No dataValues array found.');
      }

      const newDataValues = [];
      let skippedReadOnly = 0;
      let skippedNotFound = 0;

      for (const dv of sourceData.dataValues) {
        const key = dv.dataElement + '||' + dv.categoryOptionCombo;
        let masterPos = -1;

        if (sourceSite === 'gsphcda') {
          if (gsphcdaIndex.has(key)) {
            masterPos = gsphcdaIndex.get(key);
          }
        } else {
          if (dpnigeriaIndex.has(key)) {
            const dpIdx = dpnigeriaIndex.get(key);
            if (dpIdx < masterFields.length) {
              masterPos = dpIdx;
            } else {
              skippedNotFound++;
              continue;
            }
          } else {
            skippedNotFound++;
            continue;
          }
        }

        if (masterPos === -1 || masterPos >= masterFields.length) {
          skippedNotFound++;
          continue;
        }

        const masterField = masterFields[masterPos];
        if (skipReadOnly && masterField.readOnly) {
          skippedReadOnly++;
          continue;
        }

        let targetDE, targetCO;
        if (targetSite === 'gsphcda') {
          targetDE = masterField.dataElement;
          targetCO = masterField.categoryOptionCombo;
        } else {
          if (masterPos < dpnigeriaFields.length) {
            const dpField = dpnigeriaFields[masterPos];
            targetDE = dpField.dataElement;
            targetCO = dpField.categoryOptionCombo;
          } else {
            skippedNotFound++;
            continue;
          }
        }

        newDataValues.push({
          dataElement: targetDE,
          categoryOptionCombo: targetCO,
          value: dv.value
        });
      }

      const output = {
        facility: sourceData.facility || {},
        reportDate: new Date().toISOString(),
        dataValues: newDataValues
      };

      const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'converted_' + (sourceData.facility?.facility || 'data') + '.json';
      a.click();
      URL.revokeObjectURL(url);

      resultDiv.style.display = 'block';
      resultDiv.style.background = '#f0fdf4';
      resultDiv.textContent = `✅ Converted ${newDataValues.length} values. Skipped read-only: ${skippedReadOnly}, not found: ${skippedNotFound}`;
    } catch (err) {
      resultDiv.style.display = 'block';
      resultDiv.style.background = '#fee2e2';
      resultDiv.textContent = 'Error: ' + err.message;
    }
  };
  reader.readAsText(fileInput.files[0]);
});
