// ====== Converter logic ======
document.getElementById('convertBtn').addEventListener('click', () => {
  const source = document.getElementById('source').value;
  const target = document.getElementById('target').value;
  const fileInput = document.getElementById('fileInput');
  const resultDiv = document.getElementById('result');
  
  if (!fileInput.files[0]) {
    resultDiv.style.display = 'block';
    resultDiv.style.background = '#fee2e2';
    resultDiv.textContent = 'Please select a JSON file.';
    return;
  }

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const sourceData = JSON.parse(e.target.result);
      if (!Array.isArray(sourceData.dataValues)) {
        throw new Error('No dataValues array found.');
      }

      const sourceFields = source === 'gsphcda' ? gsphcdaFields : dpnigeriaFields;
      const targetFields = target === 'gsphcda' ? gsphcdaFields : dpnigeriaFields;

      // Build a position lookup for source: key "de||co" -> index
      const sourcePosMap = new Map();
      sourceFields.forEach((f, idx) => {
        const key = f.dataElement + '||' + f.categoryOptionCombo;
        sourcePosMap.set(key, idx);
      });

      const newDataValues = [];
      for (const dv of sourceData.dataValues) {
        const key = dv.dataElement + '||' + dv.categoryOptionCombo;
        const pos = sourcePosMap.get(key);
        if (pos !== undefined && pos < targetFields.length) {
          const targetF = targetFields[pos];
          newDataValues.push({
            dataElement: targetF.dataElement,
            categoryOptionCombo: targetF.categoryOptionCombo,
            value: dv.value
          });
        } else {
          console.warn('Skipped entry not found in source map:', dv);
        }
      }

      // Build output JSON, preserving facility info
      const output = {
        facility: sourceData.facility || {},
        reportDate: new Date().toISOString(),
        dataValues: newDataValues
      };

      // Trigger download
      const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'converted_' + (sourceData.facility?.facility || 'data') + '.json';
      a.click();
      URL.revokeObjectURL(url);

      resultDiv.style.display = 'block';
      resultDiv.style.background = '#f0fdf4';
      resultDiv.textContent = `✅ Converted ${newDataValues.length} values. File downloaded.`;
    } catch (err) {
      resultDiv.style.display = 'block';
      resultDiv.style.background = '#fee2e2';
      resultDiv.textContent = 'Error: ' + err.message;
    }
  };
  reader.readAsText(fileInput.files[0]);
});
</script>
</body>
</html>
