<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HMIS JSON Converter – Scan‑Based</title>
<style>
body { font-family: 'Segoe UI', sans-serif; max-width: 700px; margin: 30px auto; padding: 20px; }
label { font-weight: 600; display: block; margin-top: 16px; }
input, select, button { font-size: 14px; padding: 8px 12px; margin: 5px 0; border-radius: 6px; border: 1px solid #bbb; }
button { background: #7c3aed; color: white; border: none; cursor: pointer; font-weight: bold; }
button:hover { background: #6d28d9; }
#result { margin-top: 16px; padding: 12px; border-radius: 8px; display: none; }
.info { font-size: 13px; color: #555; }
</style>
</head>
<body>
<h2>HMIS JSON Converter – Scan‑Based</h2>
<p class="info">This version reads your actual field scan files, so the mapping is always perfect.</p>

<label>1. Upload <b>gsphcda scan</b> (field_scan_gsphcda_v2.json)</label>
<input type="file" id="gsScanFile" accept=".json">

<label>2. Upload <b>dpnigeria scan</b> (field_scan_dpnigeria_v2.json)</label>
<input type="file" id="dpScanFile" accept=".json">

<label>3. Source site</label>
<select id="sourceSite">
  <option value="gsphcda">gsphcda-dhis.org.ng</option>
  <option value="dpnigeria" selected>dhis2nigeria.org.ng</option>
</select>

<label>4. Upload <b>source JSON</b> (the file you want to convert)</label>
<input type="file" id="sourceFile" accept=".json">

<br><br>
<button id="convertBtn">Convert & Download</button>
<div id="result"></div>

<script>
document.getElementById('convertBtn').addEventListener('click', async () => {
  const gsFile = document.getElementById('gsScanFile').files[0];
  const dpFile = document.getElementById('dpScanFile').files[0];
  const srcFile = document.getElementById('sourceFile').files[0];
  const sourceSite = document.getElementById('sourceSite').value;
  const resultDiv = document.getElementById('result');

  if (!gsFile || !dpFile || !srcFile) {
    resultDiv.style.display = 'block';
    resultDiv.style.background = '#fee2e2';
    resultDiv.textContent = 'Please upload all three files.';
    return;
  }

  try {
    // Parse scans
    const gsScan = JSON.parse(await gsFile.text());
    const dpScan = JSON.parse(await dpFile.text());
    const srcData = JSON.parse(await srcFile.text());

    // Build key arrays and sets
    const gsKeys = gsScan.map(f => f.dataElement + '||' + f.categoryOptionCombo);
    const dpKeys = dpScan.map(f => f.dataElement + '||' + f.categoryOptionCombo);
    const dpKeySet = new Set(dpKeys);

    // Determine blocked GS keys (present in GS but missing in DP)
    const blockedGsKeys = new Set(gsKeys.filter(k => !dpKeySet.has(k)));

    // Build a map: GS key -> GS index
    const gsKeyToIdx = new Map(gsKeys.map((k, i) => [k, i]));
    // Build a map: DP key -> DP index
    const dpKeyToIdx = new Map(dpKeys.map((k, i) => [k, i]));

    // Build source value map
    const srcMap = new Map();
    srcData.dataValues.forEach(dv => srcMap.set(dv.dataElement + '||' + dv.categoryOptionCombo, dv.value));

    const outputValues = [];

    if (sourceSite === 'dpnigeria') {
      // dpnigeria -> gsphcda
      // We'll fill all GS keys, using value from corresponding DP key if exists, else "0"
      for (const gsKey of gsKeys) {
        let value;
        if (blockedGsKeys.has(gsKey)) {
          value = '0';
        } else {
          // Find the DP key that is at the same position? No, need mapping.
          // We don't have a direct positional mapping yet; we need to align them.
          // The scans are in the same order except for blocked fields.
          // We'll iterate both arrays in order, advancing GS pointer past blocked.
        }
      }
      // Better: use the positional alignment approach but with dynamic arrays
      // Align DP to GS
      const alignedValues = [];
      let gsIdx = 0;
      for (let dpIdx = 0; dpIdx < dpKeys.length; dpIdx++) {
        // skip blocked gs positions
        while (gsIdx < gsKeys.length && blockedGsKeys.has(gsKeys[gsIdx])) {
          alignedValues.push('0');  // blocked -> 0
          gsIdx++;
        }
        if (gsIdx < gsKeys.length) {
          const dpKey = dpKeys[dpIdx];
          const val = srcMap.get(dpKey) ?? '0';
          alignedValues.push(val);
          gsIdx++;
        }
      }
      // Fill remaining GS positions (if any) with "0"
      while (gsIdx < gsKeys.length) {
        alignedValues.push('0');
        gsIdx++;
      }
      // Now build output
      for (let i = 0; i < gsKeys.length; i++) {
        const [de, co] = gsKeys[i].split('||');
        outputValues.push({
          dataElement: de,
          categoryOptionCombo: co,
          value: alignedValues[i] ?? '0'
        });
      }
    } else {
      // gsphcda -> dpnigeria
      // We'll align GS to DP, skipping blocked GS keys
      let gsIdx = 0;
      for (let dpIdx = 0; dpIdx < dpKeys.length; dpIdx++) {
        while (gsIdx < gsKeys.length && blockedGsKeys.has(gsKeys[gsIdx])) {
          gsIdx++;
        }
        if (gsIdx < gsKeys.length) {
          const gsKey = gsKeys[gsIdx];
          const val = srcMap.get(gsKey) ?? '0';
          const [de, co] = dpKeys[dpIdx].split('||');
          outputValues.push({
            dataElement: de,
            categoryOptionCombo: co,
            value: val
          });
          gsIdx++;
        }
      }
    }

    const output = {
      facility: srcData.facility || {},
      reportDate: new Date().toISOString(),
      dataValues: outputValues
    };

    // Download
    const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'converted_' + (srcData.facility?.facility || 'data') + '.json';
    a.click();
    URL.revokeObjectURL(url);

    resultDiv.style.display = 'block';
    resultDiv.style.background = '#f0fdf4';
    resultDiv.textContent = `✅ Converted ${outputValues.length} values. Blocked GS fields: ${blockedGsKeys.size}`;
  } catch (err) {
    resultDiv.style.display = 'block';
    resultDiv.style.background = '#fee2e2';
    resultDiv.textContent = 'Error: ' + err.message;
  }
});
</script>
</body>
</html>
